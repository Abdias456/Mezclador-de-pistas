<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezclador Multipista Pro VU METER</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00adb5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        
        /* DISEÑO DE LA CABECERA CON TU LOGOTIPO */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .app-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,173,181,0.3);
            background-color: var(--accent-color); 
        }
        h1 { 
            text-align: center; 
            color: var(--accent-color); 
            margin: 0; 
            font-size: 1.8rem;
        }

        /* SECCIÓN DE PROYECTOS (NUEVA) */
        .project-section {
            background: #16222f;
            border: 1px solid #23395b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .project-section-title {
            font-weight: bold;
            color: #b3efff;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .project-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-project {
            background-color: #23395b;
            color: #b3efff;
            font-size: 0.85em;
            padding: 8px 12px;
        }
        .btn-project:hover {
            background-color: #2c4a75;
        }
        #project-file-input { display: none; }
        
        /* Zona de carga de pistas */
        .upload-section {
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #1a1a1a;
        }
        .file-input-label {
            background-color: var(--accent-color);
            color: #121212;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        #file-input { display: none; }

        /* Controles Globales */
        .global-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-main { background-color: var(--accent-color); color: #121212; }
        button.active-solo { background-color: #ff5722; color: white; }
        button.active-mute { background-color: #d32f2f; color: white; }
        
        button.btn-delete {
            background-color: #3a1a1a;
            color: #ff5252;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
        button.btn-delete:hover { background-color: #d32f2f; color: white; }
        
        /* Timeline */
        .timeline-container {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
        }
        .timeline-slider {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
            margin-bottom: 8px;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #aaa;
            font-family: monospace;
        }

        /* Pistas individuales */
        .track {
            background: #282828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 8px;
            gap: 10px;
        }
        .track-name-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            flex-grow: 1;
        }
        .track-title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Área visual: Vúmetro + Onda Estática */
        .visual-area {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            height: 60px;
        }
        
        /* Contenedor del Vúmetro (VU Meter) vertical */
        .vu-meter-container {
            width: 12px;
            height: 100%;
            background: #151515;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }
        .vu-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%; 
            background: linear-gradient(to top, #2ecc71 0%, #2ecc71 70%, #f1c40f 70%, #f1c40f 85%, #e74c3c 85%, #e74c3c 100%);
            transition: height 0.05s ease;
        }

        /* Contenedor de la Forma de Onda Completa */
        .waveform-container {
            position: relative;
            flex-grow: 1;
            height: 100%;
            background: #151515;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
        }
        .waveform-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .playhead-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background-color: #ff5722;
            pointer-events: none;
            box-shadow: 0 0 4px #ff5722;
        }

        .track-controls { display: flex; align-items: center; gap: 10px; }
        .vol-slider { flex-grow: 1; accent-color: var(--accent-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <img src="logo.png" alt="Logo" class="app-logo" onerror="this.style.display='none'">
        <h1>Mi Mezclador Pro Audio</h1>
    </div>

    <div class="project-section">
        <div class="project-section-title">📁 Mis Creaciones y Proyectos</div>
        <div class="project-buttons">
            <button id="btn-save-project" class="btn-project">💾 Guardar Proyecto (.mpro)</button>
            <label for="project-file-input" class="btn-project" style="border-radius:20px; font-weight:bold; cursor:pointer;">📂 Cargar Proyecto</label>
            <input type="file" id="project-file-input" accept=".mpro">
        </div>
        <div id="project-status" style="font-size: 0.8em; color: #a5c4d4; display:none;"></div>
    </div>
    
    <div class="upload-section">
        <p style="margin-top:0;" id="upload-instruction">Selecciona tus pistas de audio a la vez</p>
        <label for="file-input" class="file-input-label" id="btn-upload-label">📁 Cargar Pistas</label>
        <input type="file" id="file-input" accept="audio/*" multiple>
        <div id="file-count" style="font-size: 0.85em; margin-top: 10px; color: #aaa;">Ninguna pista cargada</div>
    </div>

    <div class="global-controls">
        <button id="btn-rewind">⏪ -10s</button>
        <button id="btn-play" class="btn-main">▶ Play</button>
        <button id="btn-pause">⏸ Pause</button>
        <button id="btn-stop">⏹ Stop</button>
        <button id="btn-forward">⏩ +10s</button>
    </div>

    <div class="timeline-container">
        <input type="range" id="timeline" class="timeline-slider" min="0" max="100" value="0" disabled>
        <div class="time-display">
            <span id="time-current">00:00</span>
            <span id="time-total">00:00</span>
        </div>
    </div>

    <div id="tracks-container"></div>
</div>

<script>
    let audioTracks = []; 
    let isPlaying = false;
    let userIsSeeking = false; 
    let trackCounter = 0; 
    let audioCtx = null; 
    let proyectoCargadoPendiente = null; // Almacena temporalmente la configuración de un .mpro importado

    const fileInput = document.getElementById('file-input');
    const container = document.getElementById('tracks-container');
    const fileCountLabel = document.getElementById('file-count');
    const timeline = document.getElementById('timeline');
    const timeCurrentLabel = document.getElementById('time-current');
    const timeTotalLabel = document.getElementById('time-total');
    const projectFileInput = document.getElementById('project-file-input');
    const projectStatus = document.getElementById('project-status');
    const uploadInstruction = document.getElementById('upload-instruction');
    const btnUploadLabel = document.getElementById('btn-upload-label');

    // NUEVA FUNCIÓN: Guardar toda la configuración actual de la mezcla a un archivo externo
    document.getElementById('btn-save-project').addEventListener('click', () => {
        if (audioTracks.length === 0) {
            alert("No tienes ninguna pista cargada para guardar en tu proyecto.");
            return;
        }

        // Mapeamos solo las variables importantes del estado actual de la mezcla
        const datosProyecto = audioTracks.map(track => {
            const trackNode = document.getElementById(`node-${track.id}`);
            const volInput = trackNode ? trackNode.querySelector('.vol-slider') : null;
            return {
                fileName: track.originalName,
                volume: volInput ? parseFloat(volInput.value) : track.audioElement.volume,
                isMuted: track.isMuted,
                isSolo: track.isSolo
            };
        });

        const contenidoTexto = JSON.stringify(datosProyecto, null, 2);
        const blob = new Blob([contenidoTexto], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        // Simular descarga del archivo .mpro personalizado
        const a = document.createElement('a');
        a.href = url;
        a.download = `proyecto_mezcla_${new Date().toISOString().slice(0,10)}.mpro`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    // NUEVA FUNCIÓN: Leer un archivo de proyecto .mpro
    projectFileInput.addEventListener('change', (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const datos = JSON.parse(evt.target.result);
                if (!Array.isArray(datos)) throw new Error();

                // Limpiar mesa de mezcla actual si hubiese algo abierto
                limpiarTodo();

                proyectoCargadoPendiente = datos;

                // Cambiar el texto de la interfaz para guiar al usuario
                projectStatus.style.display = "block";
                projectStatus.innerHTML = `<strong>¡Proyecto cargado con éxito!</strong> Estructura de ${datos.length} pistas lista.<br>⚠️ Ahora toca el botón de abajo y selecciona los archivos de música para activar el reproductor.`;
                
                uploadInstruction.innerText = "🚨 Proyecto detectado. Selecciona los archivos de audio correspondientes para encender la mezcla:";
                uploadInstruction.style.color = "#00adb5";
                btnUploadLabel.innerText = "⚡ Vincular archivos de audio";
                
            } catch (err) {
                alert("El archivo seleccionado no es un proyecto válido de esta aplicación.");
            }
        };
        reader.readAsText(archivo);
    });

    function limpiarTodo() {
        isPlaying = false;
        audioTracks.forEach(track => {
            track.audioElement.pause();
            URL.revokeObjectURL(track.objectURL);
        });
        audioTracks = [];
        container.innerHTML = "";
        actualizarContadorEtiqueta();
    }

    // CARGA PRINCIPAL DE PISTAS (Modificada para responder a los archivos vinculados del proyecto)
    fileInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        files.forEach((file) => {
            const cleanFileName = file.name.replace(/\.[^/.]+$/, "");
            
            // Valores por defecto
            let volInicial = 1;
            let muteInicial = false;
            let soloInicial = false;

            // Si hay un proyecto cargado en memoria, buscamos si este archivo pertenece a él para restaurar su volumen/estado
            if (proyectoCargadoPendiente) {
                const configGuardada = proyectoCargadoPendiente.find(p => p.fileName === file.name || p.fileName === cleanFileName);
                if (configGuardada) {
                    volInicial = configGuardada.volume;
                    muteInicial = configGuardada.isMuted;
                    soloInicial = configGuardada.isSolo;
                }
            }

            trackCounter++;
            const trackId = `track-${trackCounter}`;
            const fileURL = URL.createObjectURL(file);
            const audio = new Audio(fileURL);
            audio.loop = true;
            audio.crossOrigin = "anonymous";

            if (audioTracks.length === 0) {
                audio.addEventListener('loadedmetadata', () => {
                    actualizarDuracionGlobal();
                });
            }

            if (isPlaying && audioTracks.length > 0) {
                audio.currentTime = audioTracks[0].audioElement.currentTime;
                audio.play().catch(e => {});
            }

            const source = audioCtx.createMediaElementSource(audio);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 32; 
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            audioTracks.push({
                id: trackId,
                originalName: file.name,
                audioElement: audio,
                objectURL: fileURL,
                analyser: analyser,
                isMuted: muteInicial,
                isSolo: soloInicial,
                duration: 0
            });

            const trackDiv = document.createElement('div');
            trackDiv.className = 'track';
            trackDiv.id = `node-${trackId}`;
            trackDiv.innerHTML = `
                <div class="track-header">
                    <div class="track-name-wrapper">
                        <button class="btn-delete" data-id="${trackId}">❌</button>
                        <span class="track-title-text">${cleanFileName}</span>
                    </div>
                    <span class="vol-label" id="vollabel-${trackId}">${Math.round(volInicial * 100)}%</span>
                </div>
                
                <div class="visual-area">
                    <div class="vu-meter-container" title="Medidor de volumen en vivo">
                        <div id="vubar-${trackId}" class="vu-bar"></div>
                    </div>

                    <div class="waveform-container" data-id="${trackId}" id="wave-container-${trackId}">
                        <canvas id="canvas-${trackId}" class="waveform-canvas" height="60"></canvas>
                        <div id="playhead-${trackId}" class="playhead-line"></div>
                    </div>
                </div>

                <div class="track-controls">
                    <button class="btn-mute ${muteInicial ? 'active-mute' : ''}" data-id="${trackId}">Mute</button>
                    <button class="btn-solo ${soloInicial ? 'active-solo' : ''}" data-id="${trackId}">Solo</button>
                    <input type="range" class="vol-slider" data-id="${trackId}" min="0" max="1" step="0.01" value="${volInicial}">
                </div>
            `;
            container.appendChild(trackDiv);

            // Ajustar volumen inicial cargado
            audio.volume = volInicial;

            const canvas = document.getElementById(`canvas-${trackId}`);
            canvas.width = canvas.offsetWidth;

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#151515';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.fillText('Cargando mapa...', 10, 35);

            generarFormaDeOndaEstatica(file, canvas, trackId);
            activarVuMeter(trackId, analyser, audio);

            const waveContainer = document.getElementById(`wave-container-${trackId}`);
            waveContainer.addEventListener('click', function(event) {
                if (audioTracks.length === 0) return;
                const rect = waveContainer.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const porcentaje = clickX / rect.width;
                const totalDuration = audioTracks[0].audioElement.duration || audio.duration;
                
                if (totalDuration) {
                    sincronizarTiempoA(totalDuration * porcentaje);
                }
            });
        });

        // Si se completó de procesar la vinculación del proyecto, restauramos los textos originales
        if (proyectoCargadoPendiente) {
            proyectoCargadoPendiente = null;
            projectStatus.style.display = "none";
            uploadInstruction.innerText = "Selecciona tus pistas de audio a la vez";
            uploadInstruction.style.color = "white";
            btnUploadLabel.innerText = "📁 Cargar Pistas";
        }

        actualizarContadorEtiqueta();
        actualizarMezcla(); 
    });

    function activarVuMeter(trackId, analyser, audio) {
        const vuBar = document.getElementById(`vubar-${trackId}`);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function actualizar() {
            if (!document.getElementById(`vubar-${trackId}`)) return;
            requestAnimationFrame(actualizar);

            if (isPlaying && !audio.muted) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    total += dataArray[i];
                }
                let promedio = total / dataArray.length;
                let porcentajeVolumen = (promedio / 160) * 100; 
                if (porcentajeVolumen > 100) porcentajeVolumen = 100;
                vuBar.style.height = `${porcentajeVolumen}%`;
            } else {
                vuBar.style.height = '0%';
            }
        }
        actualizar();
    }

    function generarFormaDeOndaEstatica(file, canvas, trackId) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
            
            offlineCtx.decodeAudioData(arrayBuffer).then(audioBuffer => {
                const track = audioTracks.find(t => t.id === trackId);
                if (track) track.duration = audioBuffer.duration;

                const ctx = canvas.getContext('2d');
                const rawData = audioBuffer.getChannelData(0);
                const width = canvas.width;
                const height = canvas.height;
                const blockSize = Math.floor(rawData.length / width);
                const filteredData = [];

                for (let i = 0; i < width; i++) {
                    let blockStart = blockSize * i;
                    let sum = 0;
                    for (let j = 0; j < blockSize; j++) {
                        sum += Math.abs(rawData[blockStart + j]);
                    }
                    filteredData.push(sum / blockSize);
                }

                const multiplier = Math.max(...filteredData) || 1;
                
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#151515';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#00adb5'; 

                for (let i = 0; i < width; i++) {
                    const val = (filteredData[i] / multiplier) * height * 0.85;
                    const h = val < 2 ? 2 : val;
                    const y = (height - h) / 2;
                    ctx.fillRect(i, y, 1.5, h);
                }
            }).catch(err => {
                console.error(err);
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function actualizarContadorEtiqueta() {
        if (audioTracks.length === 0) {
            fileCountLabel.innerText = "Ninguna pista cargada";
            timeline.disabled = true;
            timeline.value = 0;
            timeCurrentLabel.innerText = "00:00";
            timeTotalLabel.innerText = "00:00";
        } else {
            fileCountLabel.innerText = `${audioTracks.length} pista(s) activa(s) en la mezcla.`;
            actualizarDuracionGlobal();
        }
    }

    function actualizarDuracionGlobal() {
        if (audioTracks.length > 0) {
            const master = audioTracks[0].audioElement;
            if (!isNaN(master.duration)) {
                timeline.max = master.duration;
                timeline.disabled = false;
                timeTotalLabel.innerText = formatTime(master.duration);
            }
        }
    }

    setInterval(() => {
        if (audioTracks.length > 0 && !userIsSeeking) {
            const current = audioTracks[0].audioElement.currentTime;
            const duration = audioTracks[0].audioElement.duration;
            
            if (isPlaying) {
                timeline.value = current;
                timeCurrentLabel.innerText = formatTime(current);
            }

            if (duration > 0) {
                const porcentaje = (current / duration) * 100;
                audioTracks.forEach(track => {
                    const head = document.getElementById(`playhead-${track.id}`);
                    if (head) head.style.left = `${porcentaje}%`;
                });
            }
        }
    }, 100);

    document.getElementById('btn-play').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (isPlaying) return;
        isPlaying = true;
        audioTracks.forEach(track => track.audioElement.play().catch(e => {}));
    });

    document.getElementById('btn-pause').addEventListener('click', () => {
        isPlaying = false;
        audioTracks.forEach(track => track.audioElement.pause());
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
        isPlaying = false;
        audioTracks.forEach(track => {
            track.audioElement.pause();
            track.audioElement.currentTime = 0;
        });
        if (!userIsSeeking) timeline.value = 0;
        timeCurrentLabel.innerText = "00:00";
    });

    document.getElementById('btn-forward').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        let targetTime = audioTracks[0].audioElement.currentTime + 10;
        if (targetTime > audioTracks[0].audioElement.duration) targetTime = audioTracks[0].audioElement.duration;
        sincronizarTiempoA(targetTime);
    });

    document.getElementById('btn-rewind').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        let targetTime = audioTracks[0].audioElement.currentTime - 10;
        if (targetTime < 0) targetTime = 0;
        sincronizarTiempoA(targetTime);
    });

    timeline.addEventListener('input', () => {
        userIsSeeking = true;
        timeCurrentLabel.innerText = formatTime(timeline.value);
    });

    timeline.addEventListener('change', () => {
        const nuevoTiempo = parseFloat(timeline.value);
        sincronizarTiempoA(nuevoTiempo);
        userIsSeeking = false;
    });

    function sincronizarTiempoA(segundos) {
        audioTracks.forEach(track => {
            track.audioElement.currentTime = segundos;
        });
        timeline.value = segundos;
        timeCurrentLabel.innerText = formatTime(segundos);
        
        if (audioTracks.length > 0) {
            const duration = audioTracks[0].audioElement.duration;
            if (duration > 0) {
                const porcentaje = (segundos / duration) * 100;
                audioTracks.forEach(track => {
                    const head = document.getElementById(`playhead-${track.id}`);
                    if (head) head.style.left = `${porcentaje}%`;
                });
            }
        }
    }

    container.addEventListener('input', (e) => {
        if (e.target.classList.contains('vol-slider')) {
            const id = e.target.dataset.id;
            const vol = e.target.value;
            const track = audioTracks.find(t => t.id === id);
            if (track) {
                track.audioElement.volume = vol;
                document.getElementById(`vollabel-${id}`).innerText = `${Math.round(vol * 100)}%`;
            }
        }
    });

    container.addEventListener('click', (e) => {
        const id = e.target.dataset.id;
        if (!id) return;

        if (e.target.classList.contains('btn-delete')) {
            const index = audioTracks.findIndex(t => t.id === id);
            if (index !== -1) {
                audioTracks[index].audioElement.pause();
                URL.revokeObjectURL(audioTracks[index].objectURL);
                audioTracks.splice(index, 1);
                const trackNode = document.getElementById(`node-${id}`);
                if (trackNode) trackNode.remove();
                
                actualizarContadorEtiqueta();
                actualizarMezcla();
            }
            return;
        }

        const track = audioTracks.find(t => t.id === id);
        if (!track) return;

        if (e.target.classList.contains('btn-mute')) {
            track.isMuted = !track.isMuted;
            e.target.classList.toggle('active-mute', track.isMuted);
            actualizarMezcla();
        }

        if (e.target.classList.contains('btn-solo')) {
            track.isSolo = !track.isSolo;
            e.target.classList.toggle('active-solo', track.isSolo);
            actualizarMezcla();
        }
    });

    function actualizarMezcla() {
        const hayAlguien EnSolo = audioTracks.some(t => t.isSolo);
        audioTracks.forEach(track => {
            const canvas = document.getElementById(`canvas-${track.id}`);
            if (hayAlguienEnSolo) {
                track.audioElement.muted = !track.isSolo || track.isMuted;
            } else {
                track.audioElement.muted = track.isMuted;
            }
            if (canvas) {
                canvas.style.opacity = track.audioElement.muted ? "0.25" : "1";
            }
        });
    }

    function formatTime(time) {
        if (isNaN(time)) return "00:00";
        const mins = String(Math.floor(time / 60)).padStart(2, '0');
        const secs = String(Math.floor(time % 60)).padStart(2, '0');
        return `${mins}:${secs}`;
    }
</script>

</body>
</html>
