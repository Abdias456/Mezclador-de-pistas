<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezclador Multipista Pro (Motor Nativo Ultra-Limpio)</title>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #00adb5;
            --global-accent: #ff9f43;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        
        .app-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        h1 { color: var(--accent-color); margin: 0; font-size: 1.6rem; }

        .upload-section {
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #1a1a1a;
        }
        .file-input-label {
            background-color: var(--accent-color);
            color: #121212;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        #file-input { display: none; }

        .global-pitch-container {
            background: #222831;
            border: 1px solid var(--global-accent);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .global-pitch-title {
            margin: 0 0 10px 0;
            font-size: 1em;
            color: var(--global-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
        }

        .global-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-main { background-color: var(--accent-color); color: #121212; }
        button.active-solo { background-color: #ff9f43; color: white; }
        button.active-mute { background-color: #d32f2f; color: white; }
        
        button.btn-delete {
            background-color: #3a1a1a;
            color: #ff5252;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
        
        .timeline-container {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .timeline-slider {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
            margin-bottom: 8px;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #aaa;
            font-family: monospace;
        }

        .track {
            background: #282828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 8px;
            gap: 10px;
        }
        .track-name-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            flex-grow: 1;
        }
        .track-title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .visual-area {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            height: 60px;
        }
        
        .vu-meter-container {
            width: 12px;
            height: 100%;
            background: #151515;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }
        .vu-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0%; 
            background: linear-gradient(to top, #2ecc71 0%, #2ecc71 70%, #f1c40f 70%, #f1c40f 85%, #e74c3c 85%, #e74c3c 100%);
        }

        .waveform-container {
            position: relative;
            flex-grow: 1;
            height: 100%;
            background: #151515;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
        }
        .waveform-canvas { width: 100%; height: 100%; display: block; }
        .playhead-line {
            position: absolute;
            top: 0; left: 0; width: 2px; height: 100%;
            background-color: #ff5722;
            pointer-events: none;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            background: #202020;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }
        .control-group label { font-size: 0.85em; color: #aaa; min-width: 90px; }
        .vol-slider, .pitch-slider, .global-pitch-slider { flex-grow: 1; accent-color: var(--accent-color); cursor: pointer; }
        .global-pitch-slider { accent-color: var(--global-accent); }
        .value-indicator { font-size: 0.85em; font-family: monospace; min-width: 50px; text-align: right; }
        .track-buttons { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1>Mezclador Multipista Pro (Fidelidad de Estudio)</h1>
    </div>
    
    <div class="upload-section">
        <label for="file-input" class="file-input-label">📁 Seleccionar Audios</label>
        <input type="file" id="file-input" accept="audio/*" multiple>
        <div id="file-count" style="font-size: 0.85em; margin-top: 10px; color: #888;">0 pistas activas</div>
    </div>

    <div class="global-pitch-container">
        <div class="global-pitch-title">🎛️ Modificador de Tono General (Sin Distorsión)</div>
        <div class="control-row" style="background: #1a1f29;">
            <div class="control-group">
                <label style="color: #ff9f43; font-weight: bold;">Tono Maestro</label>
                <input type="range" id="global-pitch" class="global-pitch-slider" min="-6" max="6" step="1" value="0">
                <span class="value-indicator" id="global-pitch-label" style="color: #ff9f43; font-weight: bold;">Original</span>
            </div>
        </div>
    </div>

    <div class="global-controls">
        <button id="btn-rewind">⏪ -10s</button>
        <button id="btn-play" class="btn-main">▶ Play</button>
        <button id="btn-pause">⏸ Pause</button>
        <button id="btn-stop">⏹ Stop</button>
        <button id="btn-forward">⏩ +10s</button>
    </div>

    <div class="timeline-container">
        <input type="range" id="timeline" class="timeline-slider" min="0" max="100" value="0" disabled>
        <div class="time-display">
            <span id="time-current">00:00</span>
            <span id="time-total">00:00</span>
        </div>
    </div>

    <div id="tracks-container"></div>
</div>

<script>
    let audioTracks = []; 
    let isPlaying = false;
    let userIsSeeking = false; 
    let trackCounter = 0; 
    let audioCtx = null; 
    let globalPitchShift = 0; 

    const fileInput = document.getElementById('file-input');
    const container = document.getElementById('tracks-container');
    const fileCountLabel = document.getElementById('file-count');
    const timeline = document.getElementById('timeline');
    const timeCurrentLabel = document.getElementById('time-current');
    const timeTotalLabel = document.getElementById('time-total');
    const globalPitchSlider = document.getElementById('global-pitch');
    const globalPitchLabel = document.getElementById('global-pitch-label');

    // Función matemática nativa para cambiar tono sin romper los buffers de audio
    function aplicarTonoFirme(audioElement, semitonos) {
        // Calcula la tasa de reproducción matemática perfecta basada en la escala temperada de 12 semitonos
        const ratio = Math.pow(2, semitonos / 12);
        audioElement.playbackRate = ratio;
    }

    globalPitchSlider.addEventListener('input', function(e) {
        globalPitchShift = parseInt(e.target.value);
        let sign = globalPitchShift > 0 ? "+" : "";
        globalPitchLabel.innerText = globalPitchShift === 0 ? "Original" : `${sign}${globalPitchShift} sem`;
        
        audioTracks.forEach(track => {
            const trackSlider = document.querySelector(`.pitch-slider[data-id="${track.id}"]`);
            const localPitch = trackSlider ? parseInt(trackSlider.value) : 0;
            aplicarTonoFirme(track.audioElement, localPitch + globalPitchShift);
        });
    });

    fileInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        files.forEach((file) => {
            trackCounter++;
            const trackId = `track-${trackCounter}`;
            const fileURL = URL.createObjectURL(file);
            const audio = new Audio(fileURL);
            audio.loop = true;
            audio.crossOrigin = "anonymous";
            
            // ESTA ES LA CLAVE: Le dice al hardware del navegador que mantenga la velocidad estable
            audio.preservesPitch = false; 

            if (audioTracks.length === 0) {
                audio.addEventListener('loadedmetadata', () => actualizarDuracionGlobal());
            }

            const source = audioCtx.createMediaElementSource(audio);
            const gainNode = audioCtx.createGain();
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; 

            source.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            aplicarTonoFirme(audio, globalPitchShift);

            audioTracks.push({
                id: trackId,
                audioElement: audio,
                objectURL: fileURL,
                analyser: analyser,
                gainNode: gainNode,
                isMuted: false,
                isSolo: false
            });

            const cleanFileName = file.name.replace(/\.[^/.]+$/, "");
            const trackDiv = document.createElement('div');
            trackDiv.className = 'track';
            trackDiv.id = `node-${trackId}`;
            trackDiv.innerHTML = `
                <div class="track-header">
                    <div class="track-name-wrapper">
                        <button class="btn-delete" data-id="${trackId}">❌</button>
                        <span class="track-title-text">${cleanFileName}</span>
                    </div>
                </div>
                
                <div class="visual-area">
                    <div class="vu-meter-container">
                        <div id="vubar-${trackId}" class="vu-bar"></div>
                    </div>
                    <div class="waveform-container" data-id="${trackId}" id="wave-container-${trackId}">
                        <canvas id="canvas-${trackId}" class="waveform-canvas" height="60"></canvas>
                        <div id="playhead-${trackId}" class="playhead-line"></div>
                    </div>
                </div>

                <div class="track-buttons">
                    <button class="btn-mute" data-id="${trackId}">Mute</button>
                    <button class="btn-solo" data-id="${trackId}">Solo</button>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>Volumen</label>
                        <input type="range" class="vol-slider" data-id="${trackId}" min="0" max="1" step="0.01" value="1">
                        <span class="value-indicator" id="vollabel-${trackId}">100%</span>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label>Tono Individual</label>
                        <input type="range" class="pitch-slider" data-id="${trackId}" min="-6" max="6" step="1" value="0">
                        <span class="value-indicator" id="pitchlabel-${trackId}">Original</span>
                    </div>
                </div>
            `;
            container.appendChild(trackDiv);

            const canvas = document.getElementById(`canvas-${trackId}`);
            canvas.width = canvas.offsetWidth;

            generarFormaDeOnda(file, canvas, trackId);
            activarVuMeter(trackId, analyser, audio);
        });

        actualizarContadorEtiqueta();
        actualizarMezcla(); 
    });

    function generarFormaDeOnda(file, canvas, trackId) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
            offlineCtx.decodeAudioData(arrayBuffer).then(audioBuffer => {
                const ctx = canvas.getContext('2d');
                const rawData = audioBuffer.getChannelData(0);
                const width = canvas.width;
                const height = canvas.height;
                const blockSize = Math.floor(rawData.length / width);
                const filteredData = [];

                for (let i = 0; i < width; i++) {
                    let blockStart = blockSize * i;
                    let sum = 0;
                    for (let j = 0; j < blockSize; j++) sum += Math.abs(rawData[blockStart + j]);
                    filteredData.push(sum / blockSize);
                }

                const multiplier = Math.max(...filteredData) || 1;
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#151515';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#00adb5'; 

                for (let i = 0; i < width; i++) {
                    const val = (filteredData[i] / multiplier) * height * 0.85;
                    const h = val < 2 ? 2 : val;
                    const y = (height - h) / 2;
                    ctx.fillRect(i, y, 1.5, h);
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function activarVuMeter(trackId, analyser, audio) {
        const vuBar = document.getElementById(`vubar-${trackId}`);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function actualizar() {
            if (!document.getElementById(`vubar-${trackId}`)) return;
            requestAnimationFrame(actualizar);

            if (isPlaying && !audio.muted) {
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                let promedio = total / dataArray.length;
                let porcentajeVolumen = (promedio / 140) * 100; 
                vuBar.style.height = `${Math.min(porcentajeVolumen, 100)}%`;
            } else {
                vuBar.style.height = '0%';
            }
        }
        actualizar();
    }

    container.addEventListener('input', (e) => {
        const id = e.target.dataset.id;
        if (!id) return;
        const track = audioTracks.find(t => t.id === id);
        if (!track) return;

        if (e.target.classList.contains('vol-slider')) {
            const vol = e.target.value;
            track.gainNode.gain.value = vol; 
            document.getElementById(`vollabel-${id}`).innerText = `${Math.round(vol * 100)}%`;
        }

        if (e.target.classList.contains('pitch-slider')) {
            const semitonosLocales = parseInt(e.target.value);
            aplicarTonoFirme(track.audioElement, semitonosLocales + globalPitchShift);
            let sign = semitonosLocales > 0 ? "+" : "";
            document.getElementById(`pitchlabel-${id}`).innerText = semitonosLocales === 0 ? "Original" : `${sign}${semitonosLocales} sem`;
        }
    });

    function actualizarContadorEtiqueta() {
        if (audioTracks.length === 0) {
            fileCountLabel.innerText = "0 pistas activas";
            timeline.disabled = true;
            timeline.value = 0;
            timeCurrentLabel.innerText = "00:00";
            timeTotalLabel.innerText = "00:00";
        } else {
            fileCountLabel.innerText = `${audioTracks.length} pista(s) cargada(s).`;
            actualizarDuracionGlobal();
        }
    }

    function actualizarDuracionGlobal() {
        if (audioTracks.length > 0) {
            const master = audioTracks[0].audioElement;
            if (!isNaN(master.duration)) {
                timeline.max = master.duration;
                timeline.disabled = false;
                timeTotalLabel.innerText = formatTime(master.duration);
            }
        }
    }

    setInterval(() => {
        if (audioTracks.length > 0 && !userIsSeeking) {
            const current = audioTracks[0].audioElement.currentTime;
            const duration = audioTracks[0].audioElement.duration;
            if (isPlaying) {
                timeline.value = current;
                timeCurrentLabel.innerText = formatTime(current);
            }
            if (duration > 0) {
                const porcentaje = (current / duration) * 100;
                audioTracks.forEach(track => {
                    const head = document.getElementById(`playhead-${track.id}`);
                    if (head) head.style.left = `${porcentaje}%`;
                });
            }
        }
    }, 100);

    document.getElementById('btn-play').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        if (isPlaying) return;
        isPlaying = true;
        audioTracks.forEach(track => track.audioElement.play().catch(e => {}));
    });

    document.getElementById('btn-pause').addEventListener('click', () => {
        isPlaying = false;
        audioTracks.forEach(track => track.audioElement.pause());
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
        isPlaying = false;
        audioTracks.forEach(track => {
            track.audioElement.pause();
            track.audioElement.currentTime = 0;
        });
        if (!userIsSeeking) timeline.value = 0;
        timeCurrentLabel.innerText = "00:00";
    });

    document.getElementById('btn-forward').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        let targetTime = audioTracks[0].audioElement.currentTime + 10;
        sincronizarTiempoA(targetTime);
    });

    document.getElementById('btn-rewind').addEventListener('click', () => {
        if (audioTracks.length === 0) return;
        let targetTime = audioTracks[0].audioElement.currentTime - 10;
        sincronizarTiempoA(targetTime < 0 ? 0 : targetTime);
    });

    timeline.addEventListener('input', () => {
        userIsSeeking = true;
        timeCurrentLabel.innerText = formatTime(timeline.value);
    });

    timeline.addEventListener('change', () => {
        sincronizarTiempoA(parseFloat(timeline.value));
        userIsSeeking = false;
    });

    function sincronizarTiempoA(segundos) {
        audioTracks.forEach(track => track.audioElement.currentTime = segundos);
        timeline.value = segundos;
        timeCurrentLabel.innerText = formatTime(segundos);
    }

    container.addEventListener('click', (e) => {
        const id = e.target.dataset.id;
        if (!id) return;

        if (e.target.classList.contains('btn-delete')) {
            const index = audioTracks.findIndex(t => t.id === id);
            if (index !== -1) {
                audioTracks[index].audioElement.pause();
                URL.revokeObjectURL(audioTracks[index].objectURL);
                audioTracks.splice(index, 1);
                document.getElementById(`node-${id}`).remove();
                actualizarContadorEtiqueta();
                actualizarMezcla();
            }
            return;
        }

        const track = audioTracks.find(t => t.id === id);
        if (!track) return;

        if (e.target.classList.contains('btn-mute')) {
            track.isMuted = !track.isMuted;
            e.target.classList.toggle('active-mute', track.isMuted);
            actualizarMezcla();
        }

        if (e.target.classList.contains('btn-solo')) {
            track.isSolo = !track.isSolo;
            e.target.classList.toggle('active-solo', track.isSolo);
            actualizarMezcla();
        }
    });

    function actualizarMezcla() {
        const hayAlguienEnSolo = audioTracks.some(t => t.isSolo);
        audioTracks.forEach(track => {
            const canvas = document.getElementById(`canvas-${track.id}`);
            if (hayAlguienEnSolo) {
                track.audioElement.muted = !track.isSolo || track.isMuted;
            } else {
                track.audioElement.muted = track.isMuted;
            }
            if (canvas) canvas.style.opacity = track.audioElement.muted ? "0.25" : "1";
        });
    }

    function formatTime(time) {
        if (isNaN(time)) return "00:00";
        const mins = String(Math.floor(time / 60)).padStart(2, '0');
        const secs = String(Math.floor(time % 60)).padStart(2, '0');
        return `${mins}:${secs}`;
    }
</script>

</body>
</html>
